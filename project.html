<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandOrbitX | Project Brief</title>
    <style>
        body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .box { background: rgba(30, 41, 59, 0.5); padding: 40px; border-radius: 20px; border: 1px solid #00d9ff; width: 90%; max-width: 400px; text-align: center; }

        button { width: 100%; padding: 15px; background: #00d9ff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Describe Your Project</h2>
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

            <button type="submit">SEND PROJECT</button>
        </form>
    </div>
