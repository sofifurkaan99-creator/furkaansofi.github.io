<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand OrbitX Dashboard</title>

<style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    .header { text-align:center; padding:30px; background:linear-gradient(135deg,#2563eb,#7c3aed); }
    .header img { width:250px; height:250px; border-radius:15px; margin-bottom:20px; box-shadow:0 8px 20px rgba(0,0,0,0.3); object-fit:cover; }
    
    .menu { display:flex; justify-content:center; gap:15px; padding:20px; flex-wrap:wrap; }
    .menu button { padding:12px 18px; border:none; cursor:pointer; font-weight:bold; border-radius:8px; background:#00e5ff; transition:0.3s; }
    .menu button:hover { background:white; transform:scale(1.05); }

    .grid { display:none; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:25px; padding:30px; max-width:1100px; margin:auto; }
    .active { display:grid; }

    .grid img, .grid video { width:100%; height:260px; object-fit:cover; border-radius:15px; }

    .contact { text-align:center; padding:30px; background:#111827; }
    .contact button { padding:12px 20px; background:#00e5ff; border:none; font-weight:bold; cursor:pointer; border-radius:8px; }
</style>
</head>

<body>

<div class="header">
    <img src="images/logo.png" alt="Brand OrbitX Logo" class="logo"> 
    <h1>Brand orbitX</h1>
</div>

</div>

<div class="menu">
    <button onclick="show('basic')">Basic Website</button>
    <button onclick="show('normal')">Normal Website</button>
    <button onclick="show('premium')">Premium Website</button>
</div>

<div id="basic" class="grid active">
    <video controls><source src="images/basic_v1.mp4"></video>
    <video controls><source src="images/basic_v2.mp4"></video>
    <video controls><source src="images/basic_v3.mp4"></video>
    <img src="images/basic_p1.jpg">
    <img src="images/basic_p2.jpg">
    <img src="images/basic_p3.jpg">
</div>

<div id="normal" class="grid">
    <video controls><source src="images/normal_v1.mp4"></video>
    <video controls><source src="images/normal_v2.mp4"></video>
    <video controls><source src="images/normal_v3.mp4"></video>
    <img src="images/normal_p1.jpg">
    <img src="images/normal_p2.jpg">
    <img src="images/normal_p3.jpg">
</div>

<div id="premium" class="grid">
    <video controls><source src="images/premium_v1.mp4"></video>
    <video controls><source src="images/premium_v2.mp4"></video>
    <video controls><source src="images/premium_v3.mp4"></video>
    <img src="images/premium_p1.jpg">
    <img src="images/premium_p2.jpg">
    <img src="images/premium_p3.jpg">
</div>

<div class="contact">
    <h2>Contact to Get Your Project Now</h2>
    <button onclick="goInsta()">Contact Now</button>
</div>

<script>
    function show(type){
        document.getElementById("basic").classList.remove("active");
        document.getElementById("normal").classList.remove("active");
        document.getElementById("premium").classList.remove("active");
        document.getElementById(type).classList.add("active");
    }
    function goInsta(){
        window.open("https://www.instagram.com/brand_orbitx","_blank");
    }
</script>

</body>
</html>
