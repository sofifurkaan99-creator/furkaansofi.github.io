<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrbitX Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:30px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

/* MENU */
.menu{
display:flex;
justify-content:center;
gap:15px;
padding:20px;
flex-wrap:wrap;
}

.menu button{
padding:12px 18px;
border:none;
cursor:pointer;
font-weight:bold;
border-radius:8px;
background:#00e5ff;
transition:0.3s;
}

.menu button:hover{
background:white;
transform:scale(1.05);
}

/* HIDDEN GRID */
.grid{
display:none;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:30px;
max-width:1100px;
margin:auto;
opacity:0;
transform:scale(0.95);
transition:0.4s ease;
}

/* ACTIVE */
.active{
display:grid;
opacity:1;
transform:scale(1);
}

/* IMAGES */
.grid img{
width:100%;
height:260px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.grid img:hover{
transform:scale(1.05);
}

/* CONTACT */
.contact{
text-align:center;
padding:30px;
background:#111827;
}

.contact button{
padding:12px 20px;
background:#00e5ff;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1>OrbitX Dashboard</h1>
<p>Select your website package</p>
</div>

<!-- MENU -->
<div class="menu">
<button onclick="show('basic')">Basic Website</button>
<button onclick="show('normal')">Normal Website</button>
<button onclick="show('premium')">Premium Website</button>
</div>

<!-- BASIC (hidden first) -->
<div id="basic" class="grid">

<img src="images/basic1.jpg" onclick="goInsta()">
<img src="images/basic2.jpg" onclick="goInsta()">
<img src="images/basic3.jpg" onclick="goInsta()">

</div>

<!-- NORMAL -->
<div id="normal" class="grid">

<img src="images/normal1.jpg" onclick="goInsta()">
<img src="images/normal2.jpg" onclick="goInsta()">
<img src="images/normal3.jpg" onclick="goInsta()">

</div>

<!-- PREMIUM -->
<div id="premium" class="grid">

<img src="images/premium1.jpg" onclick="goInsta()">
<img src="images/premium2.jpg" onclick="goInsta()">
<img src="images/premium3.jpg" onclick="goInsta()">

</div>

<!-- CONTACT -->
<div class="contact">
<h2>Contact to Get Your Website</h2>
<button onclick="goInsta()">Contact Now</button>
</div>

<script>
function show(type){

// hide all
document.getElementById("basic").classList.remove("active");
document.getElementById("normal").classList.remove("active");
document.getElementById("premium").classList.remove("active");

// show selected
document.getElementById(type).classList.add("active");
}

function goInsta(){
window.open("https://www.instagram.com/brand_orbitx?igsh=b24wMzNtNjJhOWNv","_blank");
}
</script>

</body>
</html>
