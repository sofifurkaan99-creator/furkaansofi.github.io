<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandOrbitX | Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glow: #00d9ff; --bg: #0f172a; --card: rgba(30, 41, 59, 0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; }

        .header { text-align: center; padding: 40px 20px; background: radial-gradient(circle, #1e3a8a 0%, #0f172a 80%); border-bottom: 2px solid var(--glow); }
        .header-logo { width: 280px; height: 280px; object-fit: cover; border-radius: 30px; border: 3px solid var(--glow); box-shadow: 0 0 30px rgba(0, 217, 255, 0.4); }

        .menu { display: flex; justify-content: center; gap: 15px; padding: 30px; }
        .menu button { padding: 12px 25px; border: 1px solid var(--glow); cursor: pointer; font-weight: bold; border-radius: 10px; background: transparent; color: var(--glow); transition: 0.3s; }
        .menu button:hover { background: var(--glow); color: #000; }

        .grid { display: none; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .grid.active { display: grid; }
        
        .item { position: relative; background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .item video, .item img { width: 100%; height: 250px; object-fit: cover; display: block; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--glow); color: #000; padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; z-index: 5; }

        .contact { text-align: center; padding: 60px 20px; background: #020617; border-top: 1px solid var(--glow); margin-top: 40px; }
        .contact button { padding: 18px 50px; background: linear-gradient(135deg, #00d9ff, #0077ff); border: none; font-weight: bold; cursor: pointer; border-radius: 12px; font-size: 1.2rem; transition: 0.4s; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <video class="header-logo" autoplay loop muted playsinline><source src="images/logo.mp4" type="video/mp4"></video>
</div>

<div class="menu">
    <button onclick="show('basic')">Basic</button>
    <button onclick="show('normal')">Normal</button>
    <button onclick="show('premium')">Premium</button>
</div>

<div id="basic" class="grid active">
    <div class="item"><div class="badge">VIDEO</div><video controls><source src="images/basic_v1.mp4"></video></div>
    <div class="item"><div class="badge">VIDEO</div><video controls><source src="images/basic_v2.mp4"></video></div>
    <div class="item"><div class="badge">VIDEO</div><video controls><source src="images/basic_v3.mp4"></video></div>
    <div class="item"><img src="images/basic_p1.jpg"></div>
    <div class="item"><img src="images/basic_p2.jpg"></div>
    <div class="item"><img src="images/basic_p3.jpg"></div>
    <div class="item"><img src="images/basic_p4.jpg"></div>
</div>

<div id="normal" class="grid">
    <div class="item"><div class="badge">VIDEO</div><video controls><source src="images/normal_v1.mp4"></video></div>
    <div class="item"><div class="badge">VIDEO</div><video controls><source src="images/normal_v2.mp4"></video></div>
    <div class="item"><div class="badge">VIDEO</div><video controls><source src="images/normal_v3.mp4"></video></div>
    <div class="item"><img src="images/normal_p1.jpg"></div>
    <div class="item"><img src="images/normal_p2.jpg"></div>
    <div class="item"><img src="images/normal_p3.jpg"></div>
    <div class="item"><img src="images/normal_p4.jpg"></div>
</div>

<div id="premium" class="grid">
    <div class="item"><div class="badge">VIDEO</div><video controls><source src="images/premium_v1.mp4"></video></div>
    <div class="item"><div class="badge">VIDEO</div><video controls><source src="images/premium_v2.mp4"></video></div>
    <div class="item"><div class="badge">VIDEO</div><video controls><source src="images/premium_v3.mp4"></video></div>
    <div class="item"><img src="images/premium_p1.jpg"></div>
    <div class="item"><img src="images/premium_p2.jpg"></div>
    <div class="item"><img src="images/premium_p3.jpg"></div>
    <div class="item"><img src="images/premium_p4.jpg"></div>
</div>

<div class="contact">
    <h2>Ready to launch your dream website?</h2>
    <br>
    <button onclick="window.location.href='project.html'"><i class="fas fa-edit"></i> Describe Your Project</button>
</div>

<script>
    function show(type) {
        document.querySelectorAll('.grid').forEach(g => g.classList.remove('active'));
        document.getElementById(type).classList.add('active');
    }
</script>
</body>
</html>
