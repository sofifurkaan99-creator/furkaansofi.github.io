<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandOrbitX | Welcome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }

        /* Video ka 2:3 ratio setup */
        .video-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; 
            max-width: 400px; /* Adjust based on your preference */
            aspect-ratio: 2 / 3; 
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Next button edge par (right side) */
        .btn-container {
            position: absolute;
            bottom: 50px;
            right: 30px; /* Edge alignment */
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1.5s forwards;
            animation-delay: 2s;
        }

        /* Glassmorphism Design */
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 35px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted playsinline loop>
            <source src="images/intro.mp4" type="video/mp4">
        </video>
    </div>

    <div class="btn-container">
        <a href="home.html" class="glass-btn">Next →</a>
    </div>

</body>
</html>
