<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandOrbitX | Welcome</title>
<style>
  @font-face {
    font-family: 'ClashDisplay';
    src: local('Arial');
  }
  :root{
    --void:#06080f;
    --panel:#0d1426;
    --primary:#7c5cff;
    --accent:#ff6b4a;
    --text:#e8eaf2;
    --muted:#5a6178;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:var(--void);
    font-family:'Inter',-apple-system,sans-serif;
    overflow:hidden;
  }

  .stage{
    position:relative;
    width:100%;height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* ambient starfield */
  .stars{
    position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(232,234,242,.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(232,234,242,.4), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(232,234,242,.3), transparent),
      radial-gradient(2px 2px at 85% 20%, rgba(124,92,255,.5), transparent),
      radial-gradient(1px 1px at 90% 75%, rgba(255,107,74,.4), transparent),
      radial-gradient(1px 1px at 10% 65%, rgba(232,234,242,.3), transparent),
      radial-gradient(1px 1px at 55% 15%, rgba(232,234,242,.4), transparent);
    background-size:100% 100%;
    opacity:.8;
  }

  .glow{
    position:absolute;
    width:600px;height:600px;
    background:radial-gradient(circle, rgba(124,92,255,.18), transparent 70%);
    filter:blur(80px);
    animation:drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift{
    from{ transform:translate(-25%,-20%); }
    to{ transform:translate(25%,20%); }
  }

  /* orbit rings around the video */
  .orbit-field{
    position:relative;
    width:340px;
    aspect-ratio:2/3;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .ring{
    position:absolute;
    border:1px solid rgba(124,92,255,.18);
    border-radius:50%;
    animation:spin linear infinite;
  }
  .ring--a{ width:440px; height:440px; animation-duration:40s; }
  .ring--b{ width:540px; height:540px; border-color:rgba(255,107,74,.12); animation-duration:60s; animation-direction:reverse; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .node{
    position:absolute;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--primary);
    box-shadow:0 0 12px 2px rgba(124,92,255,.8);
    top:-3px; left:50%;
  }
  .ring--b .node{ background:var(--accent); box-shadow:0 0 12px 2px rgba(255,107,74,.7); }

  .video-wrapper{
    position:relative;
    width:300px;
    aspect-ratio:2/3;
    border-radius:28px;
    overflow:hidden;
    border:1px solid rgba(124,92,255,.25);
    box-shadow:
      0 20px 60px rgba(0,0,0,.6),
      0 0 0 1px rgba(255,255,255,.03) inset,
      0 0 40px rgba(124,92,255,.15);
    opacity:0;
    transform:translateY(16px) scale(.96);
    animation:rise 1s cubic-bezier(.16,1,.3,1) .2s forwards;
    z-index:2;
  }
  @keyframes rise{
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  video{ width:100%; height:100%; object-fit:cover; display:block; }

  .brand-mark{
    position:absolute;
    top:48px; left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:10px;
    opacity:0;
    animation:fadeIn .8s ease .1s forwards;
    z-index:3;
  }
  .brand-mark .dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); }
  .brand-mark span{
    font-size:13px; letter-spacing:4px; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }
  @keyframes fadeIn{ to{ opacity:1; } }

  .btn-container{
    position:absolute;
    bottom:56px; left:50%;
    transform:translateX(-50%);
    z-index:3;
    opacity:0;
    animation:fadeIn .8s ease .6s forwards;
  }

  .glass-btn{
    position:relative;
    padding:17px 42px;
    background:rgba(124,92,255,.06);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(124,92,255,.4);
    color:var(--text);
    font-size:14px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:3px;
    border-radius:50px;
    text-decoration:none;
    transition:.4s cubic-bezier(.16,1,.3,1);
    display:inline-flex;
    align-items:center;
    gap:10px;
  }
  .glass-btn:hover{
    background:rgba(124,92,255,.14);
    border-color:var(--primary);
    box-shadow:0 0 30px rgba(124,92,255,.35);
    transform:translateY(-2px);
    letter-spacing:4px;
  }
  .glass-btn svg{ transition:.4s; }
  .glass-btn:hover svg{ transform:translateX(4px); }

  @media (prefers-reduced-motion: reduce){
    .ring, .glow{ animation:none; }
    .video-wrapper, .brand-mark, .btn-container{ animation:none; opacity:1; }
  }

  @media (max-width:420px){
    .video-wrapper{ width:240px; }
    .orbit-field{ width:280px; }
    .ring--a{ width:340px; height:340px; }
    .ring--b{ width:420px; height:420px; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="stars"></div>
    <div class="glow"></div>

    <div class="brand-mark"><span class="dot"></span><span>BrandOrbitX</span></div>

    <div class="orbit-field">
      <div class="ring ring--a"><span class="node"></span></div>
      <div class="ring ring--b"><span class="node"></span></div>
      <div class="video-wrapper">
        <video autoplay muted playsinline loop>
          <source src="images/intro.mp4" type="video/mp4">
        </video>
      </div>
    </div>

    <div class="btn-container">
      <a href="home.html" class="glass-btn">
        Enter
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </div>
</body>
</html>
