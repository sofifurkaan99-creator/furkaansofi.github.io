<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandOrbitX | Welcome</title>
<style>
  :root{
    --void:#06080f;
    --panel:#0d1426;
    --primary:#7c5cff;
    --accent:#ff6b4a;
    --text:#e8eaf2;
    --muted:#5a6178;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:var(--void);
    font-family:'Inter',-apple-system,sans-serif;
    overflow:hidden;
  }

  .stage{
    position:relative;
    width:100%;height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .stars{
    position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(232,234,242,.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(232,234,242,.4), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(232,234,242,.3), transparent),
      radial-gradient(2px 2px at 85% 20%, rgba(124,92,255,.5), transparent),
      radial-gradient(1px 1px at 90% 75%, rgba(255,107,74,.4), transparent),
      radial-gradient(1px 1px at 10% 65%, rgba(232,234,242,.3), transparent),
      radial-gradient(1px 1px at 55% 15%, rgba(232,234,242,.4), transparent);
    background-size:100% 100%;
    opacity:.8;
  }

  .glow{
    position:absolute;
    width:600px;height:600px;
    background:radial-gradient(circle, rgba(124,92,255,.18), transparent 70%);
    filter:blur(80px);
    animation:drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift{
    from{ transform:translate(-25%,-20%); }
    to{ transform:translate(25%,20%); }
  }

  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes fadeIn{ to{ opacity:1; } }

  /* ===== Logo lockup (CSS/SVG, no image/video) ===== */
  .logo-stage{
    position:relative;
    width:340px; height:340px;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
    transform:scale(.92);
    animation:rise 1s cubic-bezier(.16,1,.3,1) .2s forwards;
    z-index:2;
  }
  @keyframes rise{
    to{ opacity:1; transform:scale(1); }
  }

  .logo-halo{
    position:absolute;
    width:300px; height:300px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(60,140,255,.35), rgba(60,140,255,.08) 55%, transparent 75%);
    filter:blur(6px);
    animation:pulse 4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:.7; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.04); }
  }

  .logo-sphere{
    position:absolute;
    width:260px; height:260px;
    border-radius:50%;
    background:
      radial-gradient(circle at 38% 32%, rgba(90,150,255,.35), transparent 55%),
      radial-gradient(circle at 65% 70%, rgba(20,30,60,.9), #060912 70%);
    border:1px solid rgba(120,170,255,.25);
    box-shadow:
      0 0 50px rgba(60,130,255,.25),
      inset 0 0 50px rgba(0,0,0,.6);
  }
  .logo-sphere::before{
    content:'';
    position:absolute; inset:18px;
    border-radius:50%;
    border:1px solid rgba(180,210,255,.18);
  }

  .logo-orbit{
    position:absolute;
    width:300px; height:96px;
    border-radius:50%;
    border:2.5px solid #6fd4ff;
    transform:rotate(-18deg);
    box-shadow:
      0 0 14px 1px rgba(111,212,255,.85),
      0 0 34px 4px rgba(94,203,255,.35);
    animation:spin 16s linear infinite;
  }
  .logo-orbit::after{
    content:'';
    position:absolute;
    top:50%; right:-6px;
    width:11px; height:11px;
    border-radius:50%;
    background:#eafcff;
    box-shadow:0 0 16px 5px rgba(160,225,255,1);
    transform:translateY(-50%);
  }

  .logo-letters{
    position:relative;
    z-index:3;
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'Inter',sans-serif;
    font-weight:800;
    font-size:74px;
    letter-spacing:-2px;
    background:linear-gradient(180deg, #ffffff 0%, #cdd8ea 45%, #8e9bb8 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));
  }
  .logo-letters .spark{
    width:10px; height:10px;
    background:#7fd8ff;
    transform:rotate(45deg);
    box-shadow:0 0 12px 3px rgba(127,216,255,.9);
    -webkit-text-fill-color:initial;
  }

  .logo-word{
    position:absolute;
    bottom:-44px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:.5px;
    background:linear-gradient(180deg, #ffffff, #aebfe0);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    white-space:nowrap;
    opacity:0;
    animation:fadeIn .8s ease .5s forwards;
  }

  .btn-container{
    position:absolute;
    bottom:48px; left:50%;
    transform:translateX(-50%);
    z-index:3;
    opacity:0;
    animation:fadeIn .8s ease .6s forwards;
  }

  .glass-btn{
    position:relative;
    padding:17px 42px;
    background:rgba(124,92,255,.06);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(124,92,255,.4);
    color:var(--text);
    font-size:14px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:3px;
    border-radius:50px;
    text-decoration:none;
    transition:.4s cubic-bezier(.16,1,.3,1);
    display:inline-flex;
    align-items:center;
    gap:10px;
  }
  .glass-btn:hover{
    background:rgba(124,92,255,.14);
    border-color:var(--primary);
    box-shadow:0 0 30px rgba(124,92,255,.35);
    transform:translateY(-2px);
    letter-spacing:4px;
  }
  .glass-btn svg{ transition:.4s; }
  .glass-btn:hover svg{ transform:translateX(4px); }

  @media (prefers-reduced-motion: reduce){
    .logo-orbit, .logo-halo, .glow{ animation:none; }
    .logo-stage, .logo-word, .btn-container{ animation:none; opacity:1; }
  }

  @media (max-width:420px){
    .logo-stage{ width:280px; height:280px; }
    .logo-halo, .logo-sphere{ width:220px; height:220px; }
    .logo-orbit{ width:250px; height:80px; }
    .logo-letters{ font-size:58px; }
    .logo-word{ font-size:21px; bottom:-38px; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="stars"></div>
    <div class="glow"></div>

    <div class="logo-stage">
      <div class="logo-halo"></div>
      <div class="logo-sphere"></div>
      <div class="logo-orbit"></div>
      <div class="logo-letters">B<span class="spark"></span>X</div>
      <div class="logo-word">brandorbitX</div>
    </div>

    <div class="btn-container">
      <a href="home.html" class="glass-btn">
        Enter
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </div>
</body>
</html>
