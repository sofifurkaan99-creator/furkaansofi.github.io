<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandOrbitX | Experience Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #020205; font-family: 'Inter', sans-serif; }

        /* Video Container - Premium Cinematic Look */
        .video-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            aspect-ratio: 2 / 3;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 198, 255, 0.2);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .video-wrapper:hover { transform: translate(-50%, -52%) scale(1.02); }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Next Button - Advanced Glassmorphism */
        .btn-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            opacity: 0;
            animation: slideInUp 1s ease forwards 2s;
        }

        .glass-btn {
            padding: 18px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 14px;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-btn::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .glass-btn:hover {
            background: rgba(0, 198, 255, 0.2);
            border-color: #00c6ff;
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.4);
        }
        .glass-btn:hover::before { left: 100%; }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted playsinline loop>
            <source src="images/intro.mp4" type="video/mp4">
        </video>
    </div>

    <div class="btn-container">
        <a href="home.html" class="glass-btn">Explore Vision →</a>
    </div>

</body>
</html>
