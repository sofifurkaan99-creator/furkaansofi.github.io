<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandOrbitX | Ultra Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }

        /* Dynamic Glow Background */
        .glow {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 198, 255, 0.15), transparent 70%);
            filter: blur(80px);
            animation: move 10s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(80%, 80%); } }

        .video-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            aspect-ratio: 2 / 3;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Ultra Pro Glass Button */
        .btn-container {
            position: absolute;
            bottom: 50px; right: 50px;
            z-index: 10;
        }

        .glass-btn {
            padding: 20px 45px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.5s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(0, 198, 255, 0.5);
            transform: scale(1.05);
        }
        
        /* Sparkle/Pulse effect */
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 198, 255, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 198, 255, 0); } }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="video-wrapper">
        <video autoplay muted playsinline loop>
            <source src="images/intro.mp4" type="video/mp4">
        </video>
    </div>

    <div class="btn-container">
        <a href="home.html" class="glass-btn pulse">Enter Orbit →</a>
    </div>
</body>
</html>
