<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandOrbitX | Welcome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        
        .video-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .btn-container {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            opacity: 0; 
            animation: fadeIn 1.5s forwards;
            animation-delay: 2.5s;
        }

        /* Glassmorphism Effect */
        .glass-btn {
            background: rgba(255, 255, 255, 0.1); /* Transparent white */
            backdrop-filter: blur(15px);          /* Glass blur */
            -webkit-backdrop-filter: blur(15px);  /* Safari support */
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s ease;
            display: inline-block;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <div class="btn-container">
        <a href="home.html" class="glass-btn"> NEXT→</a>
    </div>

</body>
</html>
